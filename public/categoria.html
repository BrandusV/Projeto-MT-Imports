<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoria — MT IMPORTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Newsreader:ital,wght@0,400;0,600;1,400&family=Manrope:wght@400..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#b8c3ff",
            "primary-container": "#2e5bff",
            background: "#0a0a0a",
            "surface-container-lowest": "#0e0e0e",
            "surface-container-low": "#1c1b1b",
            "surface-container": "#201f1f",
            "surface-container-highest": "#353534",
            "outline-variant": "#434656",
            "on-surface-variant": "#c4c5d9",
            "on-surface": "#e5e2e1",
          },
          fontFamily: {
            headline: ["Space Grotesk", "sans-serif"],
            body: ["Newsreader", "serif"],
            label: ["Manrope", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .filter-sidebar { background:#0e0e0e; border:1px solid #434656; border-radius:20px; padding:24px; position:sticky; top:84px; }
    .filter-group { margin-bottom:24px; border-bottom:1px solid rgba(67,70,86,0.4); padding-bottom:24px; }
    .filter-group:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .filter-group-title { font-family:'Manrope',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#e5e2e1; margin-bottom:12px; }
    .filter-option { display:flex; align-items:center; gap:8px; padding:6px 0; font-family:'Manrope',sans-serif; font-size:11px; font-weight:600; color:#c4c5d9; cursor:pointer; }
    .filter-option input { accent-color:#b8c3ff; }
    .size-grid { display:flex; flex-wrap:wrap; gap:6px; }
    .size-option { padding:6px 10px; border:1px solid #434656; border-radius:8px; font-family:'Manrope',sans-serif; font-size:11px; font-weight:600; color:#c4c5d9; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:4px; }
    .size-option:has(input:checked) { border-color:#b8c3ff; background:rgba(184,195,255,0.08); color:#b8c3ff; }
    .price-input { background:#201f1f; border:1px solid #434656; border-radius:8px; padding:8px 10px; color:#e5e2e1; font-family:'Manrope',sans-serif; font-size:11px; width:100%; }
    .price-input:focus { outline:none; border-color:rgba(184,195,255,0.4); }
    .sort-select { background:#201f1f; border:1px solid #434656; border-radius:10px; padding:8px 12px; color:#c4c5d9; font-family:'Manrope',sans-serif; font-size:11px; font-weight:600; cursor:pointer; }
    .view-btn { padding:8px; background:#201f1f; border:1px solid #434656; border-radius:8px; color:#c4c5d9; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
    .view-btn.active { border-color:#b8c3ff; color:#b8c3ff; }
    @media(max-width:1024px) {
      .filter-sidebar { position:fixed; top:0; left:0; height:100vh; z-index:600; border-radius:0; width:280px; transform:translateX(-100%); transition:transform 0.3s ease; overflow-y:auto; }
      .filter-sidebar.mobile-open { transform:translateX(0); }
    }
  </style>
</head>
<body style="background:#0a0a0a;color:#e5e2e1;font-family:'Manrope',sans-serif;">
  <div id="announcement-placeholder"></div>
  <div id="header-placeholder"></div>

  <!-- CATEGORY HERO -->
  <section id="cat-hero" style="padding:80px 0 40px;background:#0e0e0e;border-bottom:1px solid rgba(67,70,86,0.4);">
    <div style="max-width:1280px;margin:0 auto;padding:0 20px;">
      <nav style="display:flex;align-items:center;gap:8px;font-size:11px;color:#c4c5d9;margin-bottom:16px;">
        <a href="/" style="color:#c4c5d9;text-decoration:none;transition:color 0.2s;">Home</a>
        <span class="material-symbols-outlined" style="font-size:12px;color:#434656;">chevron_right</span>
        <span id="breadcrumb-cat" style="color:#b8c3ff;">Categoria</span>
      </nav>
      <h1 id="cat-title" style="font-family:'Space Grotesk',sans-serif;font-size:clamp(40px,6vw,72px);font-weight:900;text-transform:uppercase;color:#e5e2e1;letter-spacing:-0.02em;line-height:0.95;margin-bottom:12px;" class="text-glow">PRODUTOS</h1>
      <p id="product-count" style="font-family:'Manrope',sans-serif;font-size:12px;color:#c4c5d9;">Carregando...</p>
    </div>
  </section>

  <!-- SHOP LAYOUT -->
  <main style="max-width:1280px;margin:0 auto;padding:40px 20px 80px;">
    <div style="display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:start;" id="shop-layout">
      <!-- SIDEBAR -->
      <aside class="filter-sidebar" id="filter-sidebar">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h3 style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;color:#e5e2e1;">Filtros</h3>
          <button onclick="clearFilters()" style="font-family:'Manrope',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#b8c3ff;background:none;border:none;cursor:pointer;">Limpar</button>
        </div>

        <div class="filter-group">
          <h4 class="filter-group-title">Preço</h4>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
            <input type="number" id="min-price" class="price-input" placeholder="Mín" min="0">
            <input type="number" id="max-price" class="price-input" placeholder="Máx" min="0">
          </div>
          <button onclick="applyPriceFilter()" class="btn-prime" style="width:100%;padding:8px;background:#2e5bff;border:none;border-radius:10px;color:#fff;font-family:'Manrope',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Aplicar</button>
        </div>

        <div class="filter-group" id="sub-filter" style="display:none;">
          <h4 class="filter-group-title">Modelo</h4>
          <div id="sub-options" style="display:flex;flex-direction:column;">
            <label class="filter-option"><input type="radio" name="subcategory" value=""> Todos</label>
            <label class="filter-option"><input type="radio" name="subcategory" value="air-force"> Air Force</label>
            <label class="filter-option"><input type="radio" name="subcategory" value="dunk"> Dunk</label>
            <label class="filter-option"><input type="radio" name="subcategory" value="air-jordan-1"> Air Jordan 1</label>
            <label class="filter-option"><input type="radio" name="subcategory" value="air-jordan-3"> Air Jordan 3</label>
            <label class="filter-option"><input type="radio" name="subcategory" value="air-jordan-4"> Air Jordan 4</label>
          </div>
        </div>

        <div class="filter-group" id="size-tenis-filter" style="display:none;">
          <h4 class="filter-group-title">Tamanho</h4>
          <div class="size-grid">
            <label class="size-option"><input type="checkbox" value="35" style="display:none;"> 35</label>
            <label class="size-option"><input type="checkbox" value="36" style="display:none;"> 36</label>
            <label class="size-option"><input type="checkbox" value="37" style="display:none;"> 37</label>
            <label class="size-option"><input type="checkbox" value="38" style="display:none;"> 38</label>
            <label class="size-option"><input type="checkbox" value="39" style="display:none;"> 39</label>
            <label class="size-option"><input type="checkbox" value="40" style="display:none;"> 40</label>
            <label class="size-option"><input type="checkbox" value="41" style="display:none;"> 41</label>
            <label class="size-option"><input type="checkbox" value="42" style="display:none;"> 42</label>
            <label class="size-option"><input type="checkbox" value="43" style="display:none;"> 43</label>
            <label class="size-option"><input type="checkbox" value="44" style="display:none;"> 44</label>
          </div>
        </div>

        <div class="filter-group" id="size-clothes-filter" style="display:none;">
          <h4 class="filter-group-title">Tamanho</h4>
          <div class="size-grid">
            <label class="size-option"><input type="checkbox" value="PP" style="display:none;"> PP</label>
            <label class="size-option"><input type="checkbox" value="P" style="display:none;"> P</label>
            <label class="size-option"><input type="checkbox" value="M" style="display:none;"> M</label>
            <label class="size-option"><input type="checkbox" value="G" style="display:none;"> G</label>
            <label class="size-option"><input type="checkbox" value="GG" style="display:none;"> GG</label>
            <label class="size-option"><input type="checkbox" value="XG" style="display:none;"> XG</label>
          </div>
        </div>

        <div class="filter-group">
          <h4 class="filter-group-title">Marca</h4>
          <div id="brand-options" style="display:flex;flex-direction:column;max-height:200px;overflow-y:auto;"></div>
        </div>
      </aside>

      <!-- PRODUCTS AREA -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:12px;">
            <button onclick="toggleMobileFilter()" style="display:none;" id="btn-filter-mobile" class="btn-prime" style="padding:8px 14px;background:#201f1f;border:1px solid #434656;border-radius:10px;color:#c4c5d9;font-family:'Manrope',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px;">
              <span class="material-symbols-outlined" style="font-size:16px;">tune</span> Filtrar
            </button>
            <span id="toolbar-count" style="font-family:'Manrope',sans-serif;font-size:11px;color:#c4c5d9;"></span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <select class="sort-select" id="sort-select" onchange="handleSort()">
              <option value="featured">Mais Relevantes</option>
              <option value="price_asc">Menor Preço</option>
              <option value="price_desc">Maior Preço</option>
              <option value="newest">Mais Novos</option>
            </select>
            <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grade"><span class="material-symbols-outlined" style="font-size:18px;">grid_view</span></button>
            <button class="view-btn" id="btn-list" onclick="setView('list')" title="Lista"><span class="material-symbols-outlined" style="font-size:18px;">view_list</span></button>
          </div>
        </div>

        <div id="products-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;">
          <div class="product-skeleton"></div>
          <div class="product-skeleton"></div>
          <div class="product-skeleton"></div>
          <div class="product-skeleton"></div>
          <div class="product-skeleton"></div>
          <div class="product-skeleton"></div>
        </div>

        <div id="no-results" style="display:none;text-align:center;padding:60px 20px;">
          <span class="material-symbols-outlined" style="font-size:56px;color:#434656;display:block;margin-bottom:16px;">search_off</span>
          <h3 style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;color:#c4c5d9;margin-bottom:8px;">Nenhum produto encontrado</h3>
          <p style="color:#434656;font-size:13px;margin-bottom:20px;">Tente ajustar os filtros.</p>
          <button onclick="clearFilters()" class="btn-prime" style="padding:10px 24px;background:#2e5bff;border:none;border-radius:10px;color:#fff;font-family:'Manrope',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Limpar Filtros</button>
        </div>

        <div id="pagination" style="display:flex;gap:6px;justify-content:center;margin-top:32px;flex-wrap:wrap;"></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('cat') || 'bolsas';
    const initialSub = urlParams.get('sub') || '';
    const initialSearch = urlParams.get('search') || '';

    const categoryNames = { tenis: 'TÊNIS', bolsas: 'BOLSAS', jaquetas: 'JAQUETAS', roupas: 'ROUPAS' };
    const catBrands = {
      tenis: ['Nike', 'Jordan', 'Off-White', 'Travis Scott', 'Tiffany', 'Louis Vuitton', 'KAWS', 'Fragment', 'Stüssy'],
      bolsas: ['Gucci', 'Louis Vuitton', 'Tory Burch', 'Saint Laurent'],
      jaquetas: ['Louis Vuitton', 'Palm Angels', 'Supreme', 'Off-White', 'Fear of God', 'Carhartt'],
      roupas: ['NBA', 'Palm Angels', 'Fear of God']
    };

    let filters = { category, subcategory: initialSub, brand: '', min_price: '', max_price: '', sort: 'featured', page: 1, search: initialSearch, limit: 12 };

    function formatPrice(v) {
      return 'R$ ' + Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }

    function renderProductCard(p) {
      const discount = p.original_price ? Math.round((1 - p.price / p.original_price) * 100) : 0;
      return `
        <div class="interactive-card product-card-group" style="background:#1c1b1b;border:1px solid #434656;border-radius:20px;overflow:hidden;cursor:pointer;" onclick="location.href='/produto.html?id=${p.id}'">
          <div style="position:relative;aspect-ratio:1/1;background:#201f1f;overflow:hidden;">
            ${p.badge ? `<span style="position:absolute;top:12px;left:12px;z-index:10;background:#2e5bff;color:#fff;font-family:'Manrope',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:999px;">${p.badge}</span>` : ''}
            <img src="${p.image_url}" alt="${p.name}" loading="lazy" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='https://placehold.co/400x400/1c1b1b/b8c3ff?text=MT'">
            <div class="quick-add-overlay" style="position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px;background:linear-gradient(to top,rgba(10,10,10,0.8) 0%,transparent 50%);">
              <button class="btn-prime" style="padding:8px 16px;background:#2e5bff;border:none;border-radius:10px;color:#fff;font-family:'Manrope',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;" onclick="event.stopPropagation();CartState.add(${p.id},null,1)">
                <span class="material-symbols-outlined" style="font-size:13px;">add_shopping_cart</span> Add
              </button>
            </div>
          </div>
          <div style="padding:16px;">
            <div style="font-family:'Manrope',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#c4c5d9;margin-bottom:4px;">${p.brand}</div>
            <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:#e5e2e1;margin-bottom:10px;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${p.name}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <span style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#b8c3ff;">${formatPrice(p.price)}</span>
              ${discount > 0 ? `<span style="background:rgba(46,91,255,0.15);color:#b8c3ff;font-family:'Manrope',sans-serif;font-size:9px;font-weight:700;padding:3px 8px;border-radius:999px;">-${discount}%</span>` : ''}
            </div>
          </div>
        </div>`;
    }

    function renderPagination(page, totalPages) {
      const pg = document.getElementById('pagination');
      if (totalPages <= 1) { pg.innerHTML = ''; return; }
      let html = '';
      if (page > 1) html += `<button onclick="goPage(${page-1})" class="page-btn"><span class="material-symbols-outlined" style="font-size:16px;">chevron_left</span></button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button onclick="goPage(${i})" class="page-btn${i===page?' active':''}">${i}</button>`;
      }
      if (page < totalPages) html += `<button onclick="goPage(${page+1})" class="page-btn"><span class="material-symbols-outlined" style="font-size:16px;">chevron_right</span></button>`;
      pg.innerHTML = html;
    }

    function goPage(p) { filters.page = p; loadProducts(); window.scrollTo({top:0,behavior:'smooth'}); }

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<div class="product-skeleton"></div>'.repeat(6);
      document.getElementById('no-results').style.display = 'none';
      try {
        const data = await ProductsAPI.getAll(filters);
        const products = data.products || [];
        const total = data.total || products.length;
        document.getElementById('product-count').textContent = total + ' produto' + (total !== 1 ? 's' : '') + ' encontrado' + (total !== 1 ? 's' : '');
        document.getElementById('toolbar-count').textContent = total + ' produto' + (total !== 1 ? 's' : '');
        if (products.length === 0) {
          grid.innerHTML = '';
          document.getElementById('no-results').style.display = 'block';
        } else {
          grid.innerHTML = products.map(renderProductCard).join('');
        }
        renderPagination(data.page || 1, data.totalPages || 1);
        loadBrands();
      } catch(e) {
        grid.innerHTML = '<p style="color:#c4c5d9;text-align:center;padding:40px;grid-column:1/-1;">Erro ao carregar produtos.</p>';
      }
    }

    function loadBrands() {
      const brands = catBrands[category] || [];
      const brandOpts = document.getElementById('brand-options');
      brandOpts.innerHTML = `<label class="filter-option"><input type="radio" name="brand" value="" ${!filters.brand?'checked':''}> Todas as marcas</label>` +
        brands.map(b => `<label class="filter-option"><input type="radio" name="brand" value="${b.toLowerCase()}" ${filters.brand===b.toLowerCase()?'checked':''}> ${b}</label>`).join('');
      brandOpts.querySelectorAll('input[name="brand"]').forEach(r => {
        r.addEventListener('change', () => { filters.brand = r.value; filters.page = 1; loadProducts(); });
      });
    }

    function handleSort() { filters.sort = document.getElementById('sort-select').value; filters.page = 1; loadProducts(); }

    function applyPriceFilter() {
      filters.min_price = document.getElementById('min-price').value;
      filters.max_price = document.getElementById('max-price').value;
      filters.page = 1;
      loadProducts();
    }

    function clearFilters() {
      filters = { category, subcategory: '', brand: '', min_price: '', max_price: '', sort: 'featured', page: 1, limit: 12 };
      document.getElementById('min-price').value = '';
      document.getElementById('max-price').value = '';
      document.querySelectorAll('.filter-option input[type="radio"]').forEach(r => { r.checked = r.value === ''; });
      document.getElementById('sort-select').value = 'featured';
      loadProducts();
    }

    function setView(view) {
      const grid = document.getElementById('products-grid');
      document.getElementById('btn-grid').classList.toggle('active', view === 'grid');
      document.getElementById('btn-list').classList.toggle('active', view === 'list');
      if (view === 'list') {
        grid.style.gridTemplateColumns = '1fr';
      } else {
        grid.style.gridTemplateColumns = 'repeat(auto-fill,minmax(220px,1fr))';
      }
    }

    function toggleMobileFilter() {
      document.getElementById('filter-sidebar').classList.toggle('mobile-open');
    }

    // Init
    document.title = (categoryNames[category] || category.toUpperCase()) + ' — MT IMPORTS';
    document.getElementById('cat-title').textContent = categoryNames[category] || category.toUpperCase();
    document.getElementById('breadcrumb-cat').textContent = categoryNames[category] || category;

    if (category === 'tenis') {
      document.getElementById('sub-filter').style.display = 'block';
      document.getElementById('size-tenis-filter').style.display = 'block';
      const subInputs = document.querySelectorAll('input[name="subcategory"]');
      subInputs.forEach(r => {
        if (r.value === initialSub) r.checked = true;
        r.addEventListener('change', () => { filters.subcategory = r.value; filters.page = 1; loadProducts(); });
      });
    } else if (category === 'roupas' || category === 'jaquetas') {
      document.getElementById('size-clothes-filter').style.display = 'block';
    }

    if (initialSearch) {
      document.getElementById('cat-title').textContent = 'BUSCA: ' + initialSearch.toUpperCase();
    }

    // Show mobile filter btn on small screens
    function checkFilterBtn() {
      const btn = document.getElementById('btn-filter-mobile');
      if (btn) btn.style.display = window.innerWidth < 1024 ? 'flex' : 'none';
    }
    checkFilterBtn();
    window.addEventListener('resize', checkFilterBtn);

    // On mobile, collapse sidebar into grid
    function checkLayout() {
      const layout = document.getElementById('shop-layout');
      if (layout) {
        layout.style.gridTemplateColumns = window.innerWidth < 1024 ? '1fr' : '240px 1fr';
      }
    }
    checkLayout();
    window.addEventListener('resize', checkLayout);

    document.addEventListener('DOMContentLoaded', loadProducts);
  </script>
</body>
</html>

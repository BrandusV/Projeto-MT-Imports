<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoria — MP IMPORTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Boogaloo&family=Inter:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="announcement-placeholder"></div>
  <div id="header-placeholder"></div>

  <!-- CATEGORY HERO -->
  <section class="cat-hero" id="cat-hero">
    <div class="container">
      <nav class="breadcrumb">
        <a href="/">Home</a>
        <i class="ph-bold ph-caret-right" style="font-size:12px;"></i>
        <span id="breadcrumb-cat">Categoria</span>
      </nav>
      <h1 class="cat-hero-title" id="cat-title">PRODUTOS</h1>
      <p class="cat-hero-count" id="product-count">Carregando...</p>
    </div>
    <span class="cat-hero-crown">👑</span>
  </section>

  <!-- SHOP LAYOUT -->
  <main class="shop-section">
    <div class="container">
      <div class="shop-layout">
        <!-- SIDEBAR -->
        <aside class="filter-sidebar" id="filter-sidebar">
          <div class="filter-header">
            <h3 class="filter-title">FILTROS</h3>
            <button class="filter-clear" onclick="clearFilters()">Limpar</button>
          </div>

          <!-- Price -->
          <div class="filter-group">
            <h4 class="filter-group-title">PREÇO</h4>
            <div class="price-inputs">
              <input type="number" id="min-price" class="price-input" placeholder="Mín" min="0">
              <span style="color:#444;">—</span>
              <input type="number" id="max-price" class="price-input" placeholder="Máx" min="0">
            </div>
            <button class="btn-apply-price" onclick="applyPriceFilter()">APLICAR</button>
          </div>

          <!-- Subcategory (only for tenis) -->
          <div class="filter-group" id="sub-filter" style="display:none;">
            <h4 class="filter-group-title">MODELO</h4>
            <div class="filter-options" id="sub-options">
              <label class="filter-option"><input type="radio" name="subcategory" value=""> Todos</label>
              <label class="filter-option"><input type="radio" name="subcategory" value="air-force"> Air Force</label>
              <label class="filter-option"><input type="radio" name="subcategory" value="dunk"> Dunk</label>
              <label class="filter-option"><input type="radio" name="subcategory" value="air-jordan-1"> Air Jordan 1</label>
              <label class="filter-option"><input type="radio" name="subcategory" value="air-jordan-3"> Air Jordan 3</label>
              <label class="filter-option"><input type="radio" name="subcategory" value="air-jordan-4"> Air Jordan 4</label>
            </div>
          </div>

          <!-- Size (tenis) -->
          <div class="filter-group" id="size-tenis-filter" style="display:none;">
            <h4 class="filter-group-title">TAMANHO</h4>
            <div class="size-grid">
              <label class="size-option" data-size="35"><input type="checkbox" value="35"> 35</label>
              <label class="size-option" data-size="36"><input type="checkbox" value="36"> 36</label>
              <label class="size-option" data-size="37"><input type="checkbox" value="37"> 37</label>
              <label class="size-option" data-size="38"><input type="checkbox" value="38"> 38</label>
              <label class="size-option" data-size="39"><input type="checkbox" value="39"> 39</label>
              <label class="size-option" data-size="40"><input type="checkbox" value="40"> 40</label>
              <label class="size-option" data-size="41"><input type="checkbox" value="41"> 41</label>
              <label class="size-option" data-size="42"><input type="checkbox" value="42"> 42</label>
              <label class="size-option" data-size="43"><input type="checkbox" value="43"> 43</label>
              <label class="size-option" data-size="44"><input type="checkbox" value="44"> 44</label>
            </div>
          </div>

          <!-- Size (clothes) -->
          <div class="filter-group" id="size-clothes-filter" style="display:none;">
            <h4 class="filter-group-title">TAMANHO</h4>
            <div class="size-grid">
              <label class="size-option"><input type="checkbox" value="PP"> PP</label>
              <label class="size-option"><input type="checkbox" value="P"> P</label>
              <label class="size-option"><input type="checkbox" value="M"> M</label>
              <label class="size-option"><input type="checkbox" value="G"> G</label>
              <label class="size-option"><input type="checkbox" value="GG"> GG</label>
              <label class="size-option"><input type="checkbox" value="XG"> XG</label>
            </div>
          </div>

          <!-- Brands -->
          <div class="filter-group">
            <h4 class="filter-group-title">MARCA</h4>
            <div class="filter-options" id="brand-options">
              <!-- Loaded dynamically -->
            </div>
          </div>
        </aside>

        <!-- PRODUCTS -->
        <div class="products-area">
          <!-- Toolbar -->
          <div class="shop-toolbar">
            <button class="btn-filter-mobile" onclick="toggleMobileFilter()">
              <i class="ph-bold ph-funnel"></i> Filtrar
            </button>
            <span class="toolbar-count" id="toolbar-count"></span>
            <div class="toolbar-right">
              <select class="sort-select" id="sort-select" onchange="handleSort()">
                <option value="featured">Mais Relevantes</option>
                <option value="price_asc">Menor Preço</option>
                <option value="price_desc">Maior Preço</option>
                <option value="newest">Mais Novos</option>
              </select>
              <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grade"><i class="ph-bold ph-grid-four"></i></button>
              <button class="view-btn" id="btn-list" onclick="setView('list')" title="Lista"><i class="ph-bold ph-list-bullets"></i></button>
            </div>
          </div>

          <!-- Products Grid -->
          <div class="products-grid" id="products-grid">
            <div class="product-skeleton"></div>
            <div class="product-skeleton"></div>
            <div class="product-skeleton"></div>
            <div class="product-skeleton"></div>
            <div class="product-skeleton"></div>
            <div class="product-skeleton"></div>
          </div>

          <!-- No results -->
          <div id="no-results" style="display:none;text-align:center;padding:60px 20px;">
            <i class="ph-bold ph-magnifying-glass" style="font-size:48px;color:#2a2a3a;"></i>
            <h3 style="font-family:'Bangers',cursive;font-size:24px;color:#555;margin-top:12px;">Nenhum produto encontrado</h3>
            <p style="color:#444;margin-top:8px;">Tente ajustar os filtros.</p>
            <button onclick="clearFilters()" style="margin-top:16px;padding:10px 24px;background:#7B2FBE;border:none;border-radius:8px;color:#FFD700;font-family:'Bangers',cursive;font-size:18px;cursor:pointer;">LIMPAR FILTROS</button>
          </div>

          <!-- Pagination -->
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('cat') || 'bolsas';
    const initialSub = urlParams.get('sub') || '';
    const initialSearch = urlParams.get('search') || '';

    const categoryNames = { tenis: 'TÊNIS', bolsas: 'BOLSAS', jaquetas: 'JAQUETAS', roupas: 'ROUPAS' };
    const categoryColors = { tenis: '#FFD700', bolsas: '#FF1493', jaquetas: '#7B2FBE', roupas: '#39FF14' };
    const catBrands = {
      tenis: ['Nike', 'Jordan', 'Off-White', 'Travis Scott', 'Tiffany', 'Louis Vuitton', 'KAWS', 'Ben & Jerry\'s', 'Fragment', 'J Balvin', 'Jarritos', 'Stüssy'],
      bolsas: ['Gucci', 'Louis Vuitton', 'Tory Burch', 'Saint Laurent'],
      jaquetas: ['Louis Vuitton', 'Palm Angels', 'Supreme', 'Off-White', 'Fear of God', 'Carhartt', 'New Balance'],
      roupas: ['NBA', 'Palm Angels', 'Fear of God']
    };

    let filters = { category, subcategory: initialSub, brand: '', min_price: '', max_price: '', sort: 'featured', page: 1, search: initialSearch, limit: 12 };

    function formatPrice(v) {
      return 'R$ ' + Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }

    function renderProductCard(p) {
      const discount = p.original_price ? Math.round((1 - p.price / p.original_price) * 100) : 0;
      return `
        <div class="product-card">
          <div class="product-img-wrap">
            ${p.badge ? `<span class="badge badge-${p.badge.toLowerCase()}">${p.badge}</span>` : ''}
            <img src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x400/14141f/7B2FBE?text=MP'">
            <button class="quick-add-btn" onclick="event.stopPropagation();CartState.add(${p.id},null,1)">
              <i class="ph-bold ph-shopping-cart"></i> ADICIONAR
            </button>
          </div>
          <div class="product-info">
            <span class="product-brand">${p.brand}</span>
            <h3 class="product-name"><a href="/produto.html?id=${p.id}">${p.name}</a></h3>
            <div class="product-pricing">
              <span class="product-price">${formatPrice(p.price)}</span>
              ${p.original_price ? `<span class="product-old-price">${formatPrice(p.original_price)}</span>` : ''}
              ${discount > 0 ? `<span class="discount-badge">-${discount}%</span>` : ''}
            </div>
          </div>
        </div>`;
    }

    function renderPagination(page, totalPages) {
      const pg = document.getElementById('pagination');
      if (totalPages <= 1) { pg.innerHTML = ''; return; }
      let html = '';
      if (page > 1) html += `<button onclick="goPage(${page-1})" class="page-btn"><i class="ph-bold ph-caret-left"></i></button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button onclick="goPage(${i})" class="page-btn${i===page?' active':''}">${i}</button>`;
      }
      if (page < totalPages) html += `<button onclick="goPage(${page+1})" class="page-btn"><i class="ph-bold ph-caret-right"></i></button>`;
      pg.innerHTML = html;
    }

    function goPage(p) { filters.page = p; loadProducts(); window.scrollTo({top:0,behavior:'smooth'}); }

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<div class="product-skeleton"></div>'.repeat(6);
      document.getElementById('no-results').style.display = 'none';
      try {
        const data = await ProductsAPI.getAll(filters);
        const products = data.products || [];
        const total = data.total || products.length;
        document.getElementById('product-count').textContent = total + ' produto' + (total !== 1 ? 's' : '') + ' encontrado' + (total !== 1 ? 's' : '');
        document.getElementById('toolbar-count').textContent = total + ' produto' + (total !== 1 ? 's' : '');
        if (products.length === 0) {
          grid.innerHTML = '';
          document.getElementById('no-results').style.display = 'block';
        } else {
          grid.innerHTML = products.map(renderProductCard).join('');
        }
        renderPagination(data.page || 1, data.totalPages || 1);
        loadBrands(products);
      } catch (e) {
        grid.innerHTML = '<p style="color:#FF1493;text-align:center;padding:40px;">Erro ao carregar produtos.</p>';
      }
    }

    function loadBrands(products) {
      const brands = catBrands[category] || [];
      const brandOpts = document.getElementById('brand-options');
      brandOpts.innerHTML = `<label class="filter-option"><input type="radio" name="brand" value="" ${!filters.brand?'checked':''}> Todas as marcas</label>` +
        brands.map(b => `<label class="filter-option"><input type="radio" name="brand" value="${b.toLowerCase()}" ${filters.brand===b.toLowerCase()?'checked':''}> ${b}</label>`).join('');
      brandOpts.querySelectorAll('input[name="brand"]').forEach(r => {
        r.addEventListener('change', () => { filters.brand = r.value; filters.page = 1; loadProducts(); });
      });
    }

    function handleSort() { filters.sort = document.getElementById('sort-select').value; filters.page = 1; loadProducts(); }

    function applyPriceFilter() {
      filters.min_price = document.getElementById('min-price').value;
      filters.max_price = document.getElementById('max-price').value;
      filters.page = 1;
      loadProducts();
    }

    function clearFilters() {
      filters = { category, subcategory: '', brand: '', min_price: '', max_price: '', sort: 'featured', page: 1, limit: 12 };
      document.getElementById('min-price').value = '';
      document.getElementById('max-price').value = '';
      document.querySelectorAll('.filter-options input[type="radio"]').forEach(r => { r.checked = r.value === ''; });
      document.getElementById('sort-select').value = 'featured';
      loadProducts();
    }

    function setView(view) {
      const grid = document.getElementById('products-grid');
      document.getElementById('btn-grid').classList.toggle('active', view === 'grid');
      document.getElementById('btn-list').classList.toggle('active', view === 'list');
      grid.classList.toggle('list-view', view === 'list');
    }

    function toggleMobileFilter() {
      document.getElementById('filter-sidebar').classList.toggle('mobile-open');
    }

    // Init
    document.title = (categoryNames[category] || category.toUpperCase()) + ' — MP IMPORTS';
    document.getElementById('cat-title').textContent = categoryNames[category] || category.toUpperCase();
    document.getElementById('breadcrumb-cat').textContent = categoryNames[category] || category;
    const heroEl = document.getElementById('cat-hero');
    if (heroEl) heroEl.style.borderBottomColor = categoryColors[category] || '#7B2FBE';

    if (category === 'tenis') {
      document.getElementById('sub-filter').style.display = 'block';
      document.getElementById('size-tenis-filter').style.display = 'block';
      const subInputs = document.querySelectorAll('input[name="subcategory"]');
      subInputs.forEach(r => {
        if (r.value === initialSub) r.checked = true;
        r.addEventListener('change', () => { filters.subcategory = r.value; filters.page = 1; loadProducts(); });
      });
    } else if (category === 'roupas' || category === 'jaquetas') {
      document.getElementById('size-clothes-filter').style.display = 'block';
    }

    if (initialSearch) {
      document.getElementById('cat-title').textContent = 'BUSCA: ' + initialSearch.toUpperCase();
    }

    document.addEventListener('DOMContentLoaded', loadProducts);
  </script>
</body>
</html>
